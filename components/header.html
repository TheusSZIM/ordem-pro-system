<!-- CONTROLE DE ORDENS PRO - HEADER COMPONENT -->
<header class="fixed top-0 w-full z-50 glass border-b border-slate-200 dark:border-slate-800 h-16 transition-all duration-300" id="main-header">
    <div class="h-full px-6 flex items-center justify-between max-w-[1920px] mx-auto">

        <!-- Logo -->
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <span class="material-symbols-rounded">menu</span>
            </button>
            <div class="flex items-center gap-3 cursor-pointer group" onclick="showPage('dashboard')">
                <div class="relative w-10 h-10 bg-gradient-to-br from-primary-600 to-primary-800 rounded-xl flex items-center justify-center shadow-lg shadow-primary-500/30 group-hover:shadow-primary-500/50 transition-all duration-300 group-hover:scale-105">
                    <span class="material-symbols-rounded text-white text-xl">receipt_long</span>
                    <div class="absolute -top-1 -right-1 w-3 h-3 bg-emerald-500 rounded-full border-2 border-white dark:border-slate-900"></div>
                </div>
                <div class="hidden sm:block">
                    <h1 class="text-lg font-bold tracking-tight leading-none bg-gradient-to-r from-slate-900 to-slate-600 dark:from-white dark:to-slate-400 bg-clip-text text-transparent">Controle Pro</h1>
                    <p class="text-[10px] text-slate-500 dark:text-slate-400 uppercase tracking-widest font-semibold mt-0.5">Enterprise + ZLP</p>
                </div>
            </div>
        </div>

        <!-- Search — autocomplete desativado para evitar sugestão de URLs -->
        <div class="hidden md:flex flex-1 max-w-2xl mx-8">
            <div class="relative w-full group">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary-500 transition-colors">
                    <span class="material-symbols-rounded">search</span>
                </span>
                <input type="search" id="global-search"
                    autocomplete="off"
                    autocorrect="off"
                    autocapitalize="off"
                    spellcheck="false"
                    placeholder="Buscar ordens, produtos... (Ctrl + K)"
                    class="w-full pl-12 pr-4 py-2.5 bg-slate-100 dark:bg-slate-900 border border-transparent rounded-xl text-sm focus:bg-white dark:focus:bg-slate-800 focus:border-primary-500 focus:ring-4 focus:ring-primary-500/10 transition-all duration-300 dark:text-white placeholder:text-slate-400"
                    onkeyup="handleGlobalSearch(event)">
                <kbd class="absolute right-4 top-1/2 -translate-y-1/2 px-2 py-1 text-[10px] font-mono bg-slate-200 dark:bg-slate-800 rounded border border-slate-300 dark:border-slate-700 text-slate-500 dark:text-slate-400 hidden lg:block">Ctrl K</kbd>
            </div>
        </div>

        <!-- Right actions -->
        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 transition-all duration-300 hover:scale-110">
                <span class="material-symbols-rounded text-xl dark:hidden">dark_mode</span>
                <span class="material-symbols-rounded text-xl hidden dark:block">light_mode</span>
            </button>

            <!-- Notifications -->
            <div class="relative">
                <button onclick="toggleNotifications()" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 transition-all duration-300 hover:scale-110 relative">
                    <span class="material-symbols-rounded text-xl">notifications</span>
                    <span id="notif-badge" class="absolute top-2 right-2 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-white dark:border-slate-900 hidden"></span>
                </button>
                <div id="notifications-panel" class="hidden absolute right-0 top-full mt-2 w-80 bg-white dark:bg-slate-900 rounded-2xl shadow-soft-lg border border-slate-200 dark:border-slate-800 overflow-hidden animate-scale-in origin-top-right">
                    <div class="p-4 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                        <h3 class="font-semibold text-sm text-slate-900 dark:text-white">Notificações</h3>
                        <button onclick="marcarTodasLidas()" class="text-xs text-primary-600 hover:text-primary-700 font-medium">Marcar todas lidas</button>
                    </div>
                    <div class="max-h-96 overflow-y-auto" id="notif-list">
                        <div class="p-6 text-center text-slate-400">
                            <span class="material-symbols-rounded text-3xl block mb-2 opacity-30">notifications_none</span>
                            <p class="text-sm">Nenhuma notificação</p>
                            <p class="text-xs mt-1 opacity-70">Configure em <button onclick="showPage('configuracoes');toggleNotifications()" class="text-primary-500 underline">Configurações</button></p>
                        </div>
                    </div>
                    <div class="p-3 border-t border-slate-100 dark:border-slate-800 text-center">
                        <button onclick="showPage('configuracoes');toggleNotifications()" class="text-xs text-slate-400 hover:text-primary-500 transition-colors flex items-center justify-center gap-1 mx-auto">
                            <span class="material-symbols-rounded text-sm">settings</span>
                            Configurar notificações
                        </button>
                    </div>
                </div>
            </div>

            <!-- User menu -->
            <div class="relative ml-2">
                <button onclick="toggleUserMenu()"
                    class="flex items-center gap-3 pl-2 pr-1 py-1 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-all duration-300 border border-transparent hover:border-slate-200 dark:hover:border-slate-700">
                    <div id="header-avatar"
                        class="w-8 h-8 rounded-full bg-gradient-to-br from-primary-500 to-primary-700 flex items-center justify-center text-white text-sm font-bold ring-2 ring-white dark:ring-slate-800 select-none">
                        ?
                    </div>
                    <div class="hidden md:block text-left mr-2">
                        <p class="text-sm font-semibold leading-tight" id="header-user-name">—</p>
                        <p class="text-[10px] text-slate-500 dark:text-slate-400" id="header-user-role">—</p>
                    </div>
                    <span class="material-symbols-rounded text-slate-400 text-lg">expand_more</span>
                </button>

                <!-- Dropdown -->
                <div id="user-menu"
                    class="hidden absolute right-0 top-full mt-2 w-72 bg-white dark:bg-slate-900 rounded-2xl shadow-soft-lg border border-slate-200 dark:border-slate-800 overflow-hidden animate-scale-in origin-top-right">

                    <div class="p-4 border-b border-slate-100 dark:border-slate-800 flex items-center gap-3">
                        <div id="menu-avatar"
                            class="w-12 h-12 rounded-full bg-gradient-to-br from-primary-500 to-primary-700 flex items-center justify-center text-white text-lg font-bold select-none flex-shrink-0">
                            ?
                        </div>
                        <div class="min-w-0">
                            <p class="font-semibold text-sm truncate" id="menu-user-name">—</p>
                            <p class="text-xs text-slate-500 truncate" id="menu-user-email">—</p>
                            <span id="menu-user-badge"
                                class="inline-flex items-center gap-1 mt-1 px-2 py-0.5 rounded-full text-[10px] font-bold bg-primary-100 dark:bg-primary-900/30 text-primary-700 dark:text-primary-400">
                                —
                            </span>
                        </div>
                    </div>

                    <div class="p-2">
                        <button onclick="openUserProfile()"
                            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 text-sm text-slate-700 dark:text-slate-300 transition-colors group">
                            <div class="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 group-hover:bg-primary-100 group-hover:text-primary-600 transition-colors">
                                <span class="material-symbols-rounded text-lg">person</span>
                            </div>
                            <div class="text-left">
                                <p class="font-medium">Meu Perfil</p>
                                <p class="text-xs text-slate-400">Ver e editar informações</p>
                            </div>
                            <span class="material-symbols-rounded ml-auto text-slate-300 text-base opacity-0 group-hover:opacity-100 transition-opacity">arrow_forward</span>
                        </button>

                        <button onclick="openPersonalizacao()"
                            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 text-sm text-slate-700 dark:text-slate-300 transition-colors group">
                            <div class="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 group-hover:bg-primary-100 group-hover:text-primary-600 transition-colors">
                                <span class="material-symbols-rounded text-lg">palette</span>
                            </div>
                            <div class="text-left">
                                <p class="font-medium">Personalização</p>
                                <p class="text-xs text-slate-400">Tema e cores do sistema</p>
                            </div>
                            <span class="material-symbols-rounded ml-auto text-slate-300 text-base opacity-0 group-hover:opacity-100 transition-opacity">arrow_forward</span>
                        </button>

                        <button onclick="showPage('configuracoes'); closeUserMenu();"
                            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 text-sm text-slate-700 dark:text-slate-300 transition-colors group">
                            <div class="w-8 h-8 rounded-lg bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 group-hover:bg-amber-100 group-hover:text-amber-600 transition-colors">
                                <span class="material-symbols-rounded text-lg">settings</span>
                            </div>
                            <div class="text-left">
                                <p class="font-medium">Configurações</p>
                                <p class="text-xs text-slate-400">Preferências do sistema</p>
                            </div>
                            <span class="material-symbols-rounded ml-auto text-slate-300 text-base opacity-0 group-hover:opacity-100 transition-opacity">arrow_forward</span>
                        </button>

                        <div class="border-t border-slate-100 dark:border-slate-800 my-1"></div>

                        <button onclick="handleLogout()"
                            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-rose-50 dark:hover:bg-rose-900/20 text-sm text-rose-600 transition-colors group">
                            <div class="w-8 h-8 rounded-lg bg-rose-50 dark:bg-rose-900/20 flex items-center justify-center text-rose-500 group-hover:bg-rose-100 transition-colors">
                                <span class="material-symbols-rounded text-lg">logout</span>
                            </div>
                            <div class="text-left">
                                <p class="font-medium">Sair</p>
                                <p class="text-xs text-rose-400">Encerrar sessão</p>
                            </div>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- MODAL DE PERFIL -->
<div id="profile-modal" class="fixed inset-0 z-[90] hidden">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeUserProfile()"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-md pointer-events-auto transform transition-all duration-300 scale-95 opacity-0" id="profile-modal-content">
            <div class="relative h-28 bg-gradient-to-br from-primary-600 to-primary-800 rounded-t-2xl overflow-hidden">
                <button onclick="closeUserProfile()" class="absolute top-4 right-4 w-8 h-8 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center text-white transition-colors">
                    <span class="material-symbols-rounded text-lg">close</span>
                </button>
                <div class="absolute -bottom-8 left-1/2 -translate-x-1/2">
                    <div id="profile-avatar-big" class="w-16 h-16 rounded-full bg-gradient-to-br from-primary-400 to-primary-700 flex items-center justify-center text-white text-2xl font-bold ring-4 ring-white dark:ring-slate-900 select-none shadow-lg">?</div>
                </div>
            </div>
            <div class="pt-12 pb-6 px-6">
                <div class="text-center mb-6">
                    <h2 class="text-xl font-bold text-slate-900 dark:text-white" id="profile-name">—</h2>
                    <p class="text-sm text-slate-500 mt-0.5" id="profile-email">—</p>
                    <span id="profile-badge" class="inline-flex items-center gap-1.5 mt-2 px-3 py-1 rounded-full text-xs font-bold bg-primary-100 dark:bg-primary-900/30 text-primary-700 dark:text-primary-400">—</span>
                </div>
                <div class="space-y-3">
                    <div class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800/50 rounded-xl">
                        <span class="material-symbols-rounded text-slate-400">badge</span>
                        <div><p class="text-xs text-slate-400">Cargo</p><p class="text-sm font-medium text-slate-700 dark:text-slate-300 mt-0.5" id="profile-cargo">—</p></div>
                    </div>
                    <div class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800/50 rounded-xl">
                        <span class="material-symbols-rounded text-slate-400">shield</span>
                        <div><p class="text-xs text-slate-400">Nível de Acesso</p><p class="text-sm font-medium text-slate-700 dark:text-slate-300 mt-0.5" id="profile-nivel">—</p></div>
                    </div>
                    <div class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800/50 rounded-xl">
                        <span class="material-symbols-rounded text-slate-400">schedule</span>
                        <div><p class="text-xs text-slate-400">Sessão iniciada</p><p class="text-sm font-medium text-slate-700 dark:text-slate-300 mt-0.5" id="profile-sessao">—</p></div>
                    </div>
                </div>
                <div class="flex gap-3 mt-6">
                    <button onclick="closeUserProfile()" class="flex-1 py-2.5 px-4 border border-slate-200 dark:border-slate-700 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 transition-colors">Fechar</button>
                    <button onclick="handleLogout()" class="flex-1 py-2.5 px-4 bg-rose-600 hover:bg-rose-700 text-white rounded-xl text-sm font-medium transition-colors flex items-center justify-center gap-2">
                        <span class="material-symbols-rounded text-lg">logout</span>Sair
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
