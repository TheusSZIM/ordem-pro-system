<!-- ============================================
     CONTROLE DE ORDENS PRO - HEADER COMPONENT
     ============================================ -->

<!-- Top Navigation -->
<header class="fixed top-0 w-full z-50 glass border-b border-slate-200 dark:border-slate-800 h-16 transition-all duration-300" id="main-header">
    <div class="h-full px-6 flex items-center justify-between max-w-[1920px] mx-auto">
        
        <!-- Logo & Brand -->
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <span class="material-symbols-rounded">menu</span>
            </button>
            
            <div class="flex items-center gap-3 cursor-pointer group" onclick="showPage('dashboard')">
                <div class="relative w-10 h-10 bg-gradient-to-br from-primary-600 to-primary-800 rounded-xl flex items-center justify-center shadow-lg shadow-primary-500/30 group-hover:shadow-primary-500/50 transition-all duration-300 group-hover:scale-105">
                    <span class="material-symbols-rounded text-white text-xl">receipt_long</span>
                    <div class="absolute -top-1 -right-1 w-3 h-3 bg-emerald-500 rounded-full border-2 border-white dark:border-slate-900"></div>
                </div>
                <div class="hidden sm:block">
                    <h1 class="text-lg font-bold tracking-tight leading-none bg-gradient-to-r from-slate-900 to-slate-600 dark:from-white dark:to-slate-400 bg-clip-text text-transparent">
                        Controle Pro
                    </h1>
                    <p class="text-[10px] text-slate-500 dark:text-slate-400 uppercase tracking-widest font-semibold mt-0.5">Enterprise + ZLP</p>
                </div>
            </div>
        </div>

        <!-- Global Search -->
        <div class="hidden md:flex flex-1 max-w-2xl mx-8">
            <div class="relative w-full group">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary-500 transition-colors">
                    <span class="material-symbols-rounded">search</span>
                </span>
                <input type="text" 
                       id="global-search"
                       placeholder="Buscar ordens, produtos ou clientes... (Ctrl + K)" 
                       class="w-full pl-12 pr-4 py-2.5 bg-slate-100 dark:bg-slate-900 border border-transparent rounded-xl text-sm focus:bg-white dark:focus:bg-slate-800 focus:border-primary-500 focus:ring-4 focus:ring-primary-500/10 transition-all duration-300 dark:text-white placeholder:text-slate-400"
                       onkeyup="handleGlobalSearch(event)">
                <kbd class="absolute right-4 top-1/2 -translate-y-1/2 px-2 py-1 text-[10px] font-mono bg-slate-200 dark:bg-slate-800 rounded border border-slate-300 dark:border-slate-700 text-slate-500 dark:text-slate-400 hidden lg:block">
                    Ctrl K
                </kbd>
            </div>
        </div>

        <!-- Right Actions -->
        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 transition-all duration-300 hover:scale-110 relative group">
                <span class="material-symbols-rounded text-xl dark:hidden">dark_mode</span>
                <span class="material-symbols-rounded text-xl hidden dark:block">light_mode</span>
                <span class="absolute inset-0 rounded-xl bg-primary-500/10 scale-0 group-hover:scale-100 transition-transform duration-300"></span>
            </button>

            <div class="relative">
                <button onclick="toggleNotifications()" class="p-2.5 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-300 transition-all duration-300 hover:scale-110 relative">
                    <span class="material-symbols-rounded text-xl">notifications</span>
                    <span class="absolute top-2 right-2 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-white dark:border-slate-900 animate-pulse"></span>
                </button>
                
                <div id="notifications-panel" class="hidden absolute right-0 top-full mt-2 w-80 bg-white dark:bg-slate-900 rounded-2xl shadow-soft-lg border border-slate-200 dark:border-slate-800 overflow-hidden animate-scale-in origin-top-right">
                    <div class="p-4 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
                        <h3 class="font-semibold text-sm">Notificações</h3>
                        <button class="text-xs text-primary-600 hover:text-primary-700 font-medium">Marcar todas lidas</button>
                    </div>
                    <div class="max-h-96 overflow-y-auto">
                        <div class="p-4 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors cursor-pointer border-l-2 border-primary-500">
                            <div class="flex gap-3">
                                <div class="w-8 h-8 rounded-full bg-primary-100 dark:bg-primary-900/30 flex items-center justify-center text-primary-600 flex-shrink-0">
                                    <span class="material-symbols-rounded text-sm">inventory</span>
                                </div>
                                <div>
                                    <p class="text-sm font-medium text-slate-800 dark:text-slate-200">Nova ordem recebida</p>
                                    <p class="text-xs text-slate-500 mt-0.5">ORD-2024-008 aguarda separação</p>
                                    <p class="text-[10px] text-slate-400 mt-1">2 minutos atrás</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="relative ml-2">
                <button onclick="toggleUserMenu()" class="flex items-center gap-3 pl-2 pr-1 py-1 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-all duration-300 border border-transparent hover:border-slate-200 dark:hover:border-slate-700">
                    <img src="https://ui-avatars.com/api/?name=Marcos+Vieira&background=4f46e5&color=fff" alt="User" class="w-8 h-8 rounded-full ring-2 ring-white dark:ring-slate-800">
                    <div class="hidden md:block text-left mr-2">
                        <p class="text-sm font-semibold leading-tight">Marcos Vieira</p>
                        <p class="text-[10px] text-slate-500 dark:text-slate-400">Supervisor</p>
                    </div>
                    <span class="material-symbols-rounded text-slate-400 text-lg">expand_more</span>
                </button>

                <div id="user-menu" class="hidden absolute right-0 top-full mt-2 w-64 bg-white dark:bg-slate-900 rounded-2xl shadow-soft-lg border border-slate-200 dark:border-slate-800 overflow-hidden animate-scale-in origin-top-right">
                    <div class="p-4 border-b border-slate-100 dark:border-slate-800">
                        <p class="font-semibold text-sm">Marcos Vieira</p>
                        <p class="text-xs text-slate-500">marcos.vieira@empresa.com</p>
                    </div>
                    <div class="p-2">
                        <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 text-sm text-slate-700 dark:text-slate-300 transition-colors">
                            <span class="material-symbols-rounded text-slate-400">person</span>
                            Perfil
                        </a>
                        <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 text-sm text-slate-700 dark:text-slate-300 transition-colors">
                            <span class="material-symbols-rounded text-slate-400">settings</span>
                            Configurações
                        </a>
                        <div class="border-t border-slate-100 dark:border-slate-800 my-1"></div>
                        <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-rose-50 dark:hover:bg-rose-900/20 text-sm text-rose-600 transition-colors">
                            <span class="material-symbols-rounded">logout</span>
                            Sair
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
