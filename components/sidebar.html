<!-- SIDEBAR RETRÁTIL -->
<style>
#sidebar, #sidebar * { box-sizing: border-box; }

#sidebar {
    position: fixed !important;
    left: 0 !important; top: 64px !important; bottom: 0 !important;
    width: 280px !important;
    background: #0c1628 !important;
    border-right: 1px solid rgba(148,163,184,.08) !important;
    display: flex !important; flex-direction: column !important;
    overflow: hidden !important; z-index: 40 !important;
    transition: width 380ms cubic-bezier(.65,0,.35,1) !important;
    will-change: width;
}
#sidebar.sb-mini { width: 76px !important; }

/* Botão recolher — fora da sidebar */
#sb-tab {
    position: fixed; top: 50%; left: 280px;
    transform: translateY(-50%);
    z-index: 42; cursor: pointer;
    display: flex; align-items: center;
    transition: left 380ms cubic-bezier(.65,0,.35,1);
}
#sb-pill {
    width: 20px; height: 52px;
    background: #151f35;
    border: 1.5px solid rgba(99,102,241,.3); border-left: none;
    border-radius: 0 14px 14px 0;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 4px 0 14px rgba(0,0,0,.5);
    transition: background 200ms, border-color 200ms, width 200ms;
}
#sb-tab:hover #sb-pill { background: rgba(99,102,241,.2); border-color: rgba(99,102,241,.65); width: 26px; }
#sb-pill .material-symbols-rounded {
    font-size: 16px; color: #818cf8;
    font-variation-settings: 'wght' 700;
    transition: transform 380ms cubic-bezier(.65,0,.35,1), color 200ms;
    flex-shrink: 0;
}
#sb-tab:hover #sb-pill .material-symbols-rounded { color: #c7d2fe; }
#sb-tab.mini-tab #sb-pill .material-symbols-rounded { transform: rotate(180deg); }

/* Nav */
#sidebar nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 16px 12px 24px; scrollbar-width: none; }
#sidebar nav::-webkit-scrollbar { display: none; }

.sb-label {
    font-size: 10px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase;
    color: #3d5270; padding: 20px 10px 6px;
    white-space: nowrap; overflow: hidden; opacity: 1; max-height: 52px;
    transition: opacity 280ms, max-height 380ms cubic-bezier(.65,0,.35,1), padding-top 380ms, padding-bottom 380ms;
}
#sidebar.sb-mini .sb-label { opacity: 0; max-height: 0; padding-top: 0; padding-bottom: 0; }

.nav-item {
    display: flex; align-items: center; gap: 14px; padding: 12px 14px;
    border-radius: 14px; cursor: pointer; color: #64748b; white-space: nowrap;
    transition: background 180ms, color 180ms, padding 380ms cubic-bezier(.65,0,.35,1), gap 380ms cubic-bezier(.65,0,.35,1);
    position: relative; margin-bottom: 4px;
    border: none; background: transparent; width: 100%; text-align: left; font-family: inherit;
}
.nav-item:hover { background: rgba(99,102,241,.1); color: #a5b4fc; }
.nav-item.active-nav { background: linear-gradient(135deg,rgba(99,102,241,.22),rgba(99,102,241,.06)); color: #818cf8; }
.nav-item.active-nav::before {
    content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 3px; height: 26px; background: linear-gradient(180deg,#a5b4fc,#6366f1); border-radius: 0 4px 4px 0;
}
.nav-item .material-symbols-rounded {
    font-size: 23px; flex-shrink: 0;
    font-variation-settings: 'FILL' 0,'wght' 300,'GRAD' 0,'opsz' 24;
    transition: transform 180ms, font-variation-settings 200ms;
}
.nav-item.active-nav .material-symbols-rounded { font-variation-settings: 'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }
.nav-item:hover .material-symbols-rounded { transform: scale(1.1); }

.nav-txt {
    display: flex; align-items: center; gap: 10px; overflow: hidden; flex: 1;
    opacity: 1; transform: translateX(0);
    transition: opacity 260ms, transform 380ms cubic-bezier(.65,0,.35,1);
}
#sidebar.sb-mini .nav-txt { opacity: 0; transform: translateX(-14px); pointer-events: none; }
.nav-name { font-size: 14.5px; font-weight: 500; overflow: hidden; white-space: nowrap; }
.nav-item.active-nav .nav-name { font-weight: 600; }
.nav-badge { font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 20px; background: rgba(99,102,241,.25); color: #818cf8; flex-shrink: 0; transition: opacity 260ms; }
#sidebar.sb-mini .nav-badge { opacity: 0; }

#sidebar.sb-mini .nav-item { justify-content: center; padding: 12px 0; gap: 0; }
#sidebar.sb-mini .nav-item.active-nav::before { height: 20px; }
#sidebar.sb-mini .nav-item::after {
    content: attr(data-label); position: absolute; left: 82px; top: 50%;
    transform: translateY(-50%) translateX(-6px);
    background: #1e293b; color: #e2e8f0; font-size: 13px; font-weight: 600;
    padding: 8px 14px; border-radius: 10px; border: 1px solid rgba(148,163,184,.12);
    box-shadow: 0 6px 22px rgba(0,0,0,.55); opacity: 0; pointer-events: none;
    transition: opacity 160ms, transform 160ms; z-index: 100; white-space: nowrap;
}
#sidebar.sb-mini .nav-item:hover::after { opacity: 1; transform: translateY(-50%) translateX(0); }

@media (max-width: 1023px) {
    #sidebar { width: 280px !important; transform: translateX(-100%) !important; transition: transform 380ms cubic-bezier(.65,0,.35,1) !important; }
    #sidebar.mobile-open { transform: translateX(0) !important; }
    #sb-tab { display: none !important; }
}
</style>

<div id="sb-tab" onclick="toggleSidebar()" title="Recolher / Expandir">
    <div id="sb-pill"><span class="material-symbols-rounded">chevron_left</span></div>
</div>

<aside id="sidebar">
    <nav>
        <div class="sb-label">Principal</div>
        <button class="nav-item active-nav" data-page="dashboard" data-label="Dashboard" onclick="showPage('dashboard')">
            <span class="material-symbols-rounded">dashboard</span>
            <span class="nav-txt"><span class="nav-name">Dashboard</span><span class="nav-badge">Novo</span></span>
        </button>
        <button class="nav-item" data-page="kanban" data-label="Quadro Kanban" onclick="showPage('kanban')">
            <span class="material-symbols-rounded">view_kanban</span>
            <span class="nav-txt"><span class="nav-name">Quadro Kanban</span></span>
        </button>
        <button class="nav-item" data-page="ordens" data-label="Lista de Ordens" onclick="showPage('ordens')">
            <span class="material-symbols-rounded">receipt_long</span>
            <span class="nav-txt"><span class="nav-name">Lista de Ordens</span></span>
        </button>
        <div class="sb-label">Gestão</div>
        <button class="nav-item" data-page="equipe" data-label="Equipe" onclick="showPage('equipe')">
            <span class="material-symbols-rounded">group</span>
            <span class="nav-txt"><span class="nav-name">Equipe</span></span>
        </button>
        <button class="nav-item" data-page="estoque" data-label="Estoque" onclick="showPage('estoque')">
            <span class="material-symbols-rounded">inventory_2</span>
            <span class="nav-txt"><span class="nav-name">Estoque</span></span>
        </button>
        <button class="nav-item" data-page="entrega" data-label="Entrega de Ordem" onclick="showPage('entrega')">
            <span class="material-symbols-rounded">local_shipping</span>
            <span class="nav-txt"><span class="nav-name">Entrega de Ordem</span></span>
        </button>
    </nav>
</aside>

<script>
(function () {
    const LS = 'sb_mini';
    const W_OPEN = 280, W_MINI = 76;
    let mini = localStorage.getItem(LS) === 'true';
    let _contentEl = null;

    /* Injeta regra CSS no <head> — abordagem mais confiável */
    const styleTag = document.createElement('style');
    styleTag.id = 'sb-layout-style';
    (document.head || document.documentElement).appendChild(styleTag);

    function setLayoutCSS() {
        const w = mini ? W_MINI : W_OPEN;
        /* 
           Aplica SOMENTE ao container de páginas do Ordem Pro.
           Usa o pai do primeiro .page encontrado — que é o wrapper real.
           Fallback: #main-content ou elemento com ml-64 no Tailwind.
        */
        styleTag.textContent = `
            /* Ordem Pro — ajuste de layout da sidebar */
            #main-content { margin-left: ${w}px !important; transition: margin-left 380ms cubic-bezier(.65,0,.35,1) !important; }
            .pages-wrapper { margin-left: ${w}px !important; transition: margin-left 380ms cubic-bezier(.65,0,.35,1) !important; }
        `;

        /* Também aplica direto no elemento pai das .page (mais confiável) */
        if (!_contentEl) {
            const firstPage = document.querySelector('.page');
            _contentEl = firstPage?.parentElement;
        }
        if (_contentEl && _contentEl !== document.body) {
            _contentEl.style.transition = 'margin-left 380ms cubic-bezier(.65,0,.35,1)';
            _contentEl.style.marginLeft = w + 'px';
        }
    }

    function updateTab() {
        const tab = document.getElementById('sb-tab');
        if (!tab) return;
        tab.style.left = (mini ? W_MINI : W_OPEN) + 'px';
        tab.classList.toggle('mini-tab', mini);
    }

    function apply(instant) {
        const sb  = document.getElementById('sidebar');
        const tab = document.getElementById('sb-tab');
        if (!sb) return;
        if (instant) { sb.style.transition = 'none'; if (tab) tab.style.transition = 'none'; }
        sb.classList.toggle('sb-mini', mini);
        updateTab();
        setLayoutCSS();
        if (instant) requestAnimationFrame(() => { sb.style.transition = ''; if (tab) tab.style.transition = ''; });
    }

    window.toggleSidebar = function () {
        if (window.innerWidth < 1024) {
            document.getElementById('sidebar')?.classList.toggle('mobile-open');
            return;
        }
        mini = !mini;
        localStorage.setItem(LS, mini);
        _contentEl = null; // reset para re-detectar
        apply(false);
    };

    const _orig = window.showPage;
    window.showPage = function (page) {
        if (_orig) _orig(page);
        document.querySelectorAll('.nav-item[data-page]').forEach(el =>
            el.classList.toggle('active-nav', el.dataset.page === page));
        if (window.innerWidth < 1024)
            document.getElementById('sidebar')?.classList.remove('mobile-open');
    };

    apply(true);
    /* Reaplica após componentes carregarem (loadComponent é async) */
    document.addEventListener('DOMContentLoaded', () => { _contentEl = null; apply(true); });
    setTimeout(() => { _contentEl = null; apply(true); }, 600);
})();
</script>
