<!-- ============================================
     SIDEBAR — Retrátil com animação
     Aberta: 240px com texto | Fechada: 68px só ícones
     ============================================ -->
<style>
:root {
    --sb-open:   240px;
    --sb-closed:  68px;
    --sb-dur:    .3s;
    --sb-ease:   cubic-bezier(.4,0,.2,1);
}

/* ── Sidebar ── */
#sidebar {
    position: fixed;
    left: 0; top: 64px; bottom: 0;
    width: var(--sb-open);
    background: #0f172a;
    border-right: 1px solid rgba(148,163,184,.08);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 40;
    transition: width var(--sb-dur) var(--sb-ease);
    will-change: width;
}

/* Estado fechado */
#sidebar.sb-closed { width: var(--sb-closed); }

/* ── Botão toggle flutuante ── */
#sb-toggle-btn {
    position: absolute;
    top: 18px;
    right: -14px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #1e293b;
    border: 1.5px solid rgba(148,163,184,.15);
    color: #94a3b8;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.4);
    transition: background .15s, color .15s, transform var(--sb-dur) var(--sb-ease);
    z-index: 41;
    flex-shrink: 0;
}
#sb-toggle-btn:hover { background: #334155; color: #e2e8f0; }
#sidebar.sb-closed #sb-toggle-btn { transform: rotate(180deg); }

/* ── Nav ── */
#sidebar nav {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px 10px;
    scrollbar-width: none;
}
#sidebar nav::-webkit-scrollbar { display: none; }

/* ── Label de grupo ── */
.sb-group-label {
    font-size: 9.5px;
    font-weight: 800;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #475569;
    padding: 16px 12px 6px;
    white-space: nowrap;
    overflow: hidden;
    transition: opacity var(--sb-dur), height var(--sb-dur), padding var(--sb-dur);
    height: 36px;
    opacity: 1;
}
#sidebar.sb-closed .sb-group-label {
    opacity: 0;
    height: 0;
    padding-top: 0;
    padding-bottom: 0;
}

/* ── Item de navegação ── */
.nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 12px;
    cursor: pointer;
    color: #64748b;
    white-space: nowrap;
    transition:
        background .15s,
        color .15s,
        padding var(--sb-dur) var(--sb-ease),
        gap var(--sb-dur) var(--sb-ease);
    position: relative;
    margin-bottom: 3px;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    font-family: inherit;
}
.nav-item:hover {
    background: rgba(99,102,241,.1);
    color: #a5b4fc;
}
.nav-item.active-nav {
    background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(99,102,241,.06));
    color: #818cf8;
}
/* Barra lateral ativa */
.nav-item.active-nav::before {
    content: '';
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 3px; height: 22px;
    background: linear-gradient(180deg, #818cf8, #6366f1);
    border-radius: 0 4px 4px 0;
}

/* Ícone */
.nav-item .material-symbols-rounded {
    font-size: 22px;
    flex-shrink: 0;
    transition: transform .15s;
    font-variation-settings: 'FILL' 0, 'wght' 300;
}
.nav-item.active-nav .material-symbols-rounded {
    font-variation-settings: 'FILL' 1, 'wght' 400;
}
.nav-item:hover .material-symbols-rounded { transform: scale(1.1); }

/* Texto do item */
.nav-label {
    font-size: 13.5px;
    font-weight: 500;
    overflow: hidden;
    white-space: nowrap;
    max-width: 180px;
    opacity: 1;
    transition:
        opacity var(--sb-dur),
        max-width var(--sb-dur) var(--sb-ease);
}
.nav-item.active-nav .nav-label { font-weight: 600; }

#sidebar.sb-closed .nav-label {
    max-width: 0;
    opacity: 0;
}

/* Badge */
.nav-badge {
    margin-left: auto;
    font-size: 9px;
    font-weight: 800;
    padding: 2px 7px;
    border-radius: 20px;
    background: rgba(99,102,241,.2);
    color: #818cf8;
    white-space: nowrap;
    transition: opacity var(--sb-dur);
    flex-shrink: 0;
}
#sidebar.sb-closed .nav-badge {
    opacity: 0;
    pointer-events: none;
}

/* ── Centraliza ícones quando fechado ── */
#sidebar.sb-closed .nav-item {
    justify-content: center;
    padding: 10px 0;
    gap: 0;
}
#sidebar.sb-closed .nav-item.active-nav::before {
    height: 18px;
}

/* ── Tooltip quando fechado ── */
#sidebar.sb-closed .nav-item::after {
    content: attr(data-label);
    position: absolute;
    left: calc(var(--sb-closed) + 10px);
    top: 50%;
    transform: translateY(-50%) translateX(-6px);
    background: #1e293b;
    color: #e2e8f0;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 8px;
    border: 1px solid rgba(148,163,184,.12);
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity .15s, transform .15s;
    z-index: 100;
}
#sidebar.sb-closed .nav-item:hover::after {
    opacity: 1;
    transform: translateY(-50%) translateX(0);
}

/* ── Área de conteúdo principal ── */
#main-content {
    margin-left: var(--sb-open);
    transition: margin-left var(--sb-dur) var(--sb-ease);
}
#main-content.sb-collapsed {
    margin-left: var(--sb-closed);
}

/* Mobile */
@media (max-width: 1023px) {
    #sidebar {
        transform: translateX(-100%);
        width: var(--sb-open) !important;
        transition: transform var(--sb-dur) var(--sb-ease);
        box-shadow: 4px 0 24px rgba(0,0,0,.5);
    }
    #sidebar.mobile-open { transform: translateX(0); }
    #main-content { margin-left: 0 !important; }
    #sb-toggle-btn { display: none; }
}
</style>

<aside id="sidebar">
    <!-- Botão toggle flutuante na borda direita -->
    <button id="sb-toggle-btn" onclick="toggleSidebar()" aria-label="Toggle sidebar">
        <span class="material-symbols-rounded" style="font-size:16px;font-variation-settings:'wght' 600;">chevron_left</span>
    </button>

    <nav>
        <!-- PRINCIPAL -->
        <div class="sb-group-label">Principal</div>

        <button class="nav-item active-nav"
                data-page="dashboard"
                data-label="Dashboard"
                onclick="showPage('dashboard')">
            <span class="material-symbols-rounded">dashboard</span>
            <span class="nav-label">Dashboard</span>
            <span class="nav-badge">Novo</span>
        </button>

        <button class="nav-item"
                data-page="kanban"
                data-label="Quadro Kanban"
                onclick="showPage('kanban')">
            <span class="material-symbols-rounded">view_kanban</span>
            <span class="nav-label">Quadro Kanban</span>
        </button>

        <button class="nav-item"
                data-page="ordens"
                data-label="Lista de Ordens"
                onclick="showPage('ordens')">
            <span class="material-symbols-rounded">receipt_long</span>
            <span class="nav-label">Lista de Ordens</span>
        </button>

        <!-- GESTÃO -->
        <div class="sb-group-label">Gestão</div>

        <button class="nav-item"
                data-page="equipe"
                data-label="Equipe"
                onclick="showPage('equipe')">
            <span class="material-symbols-rounded">group</span>
            <span class="nav-label">Equipe</span>
        </button>

        <button class="nav-item"
                data-page="estoque"
                data-label="Estoque"
                onclick="showPage('estoque')">
            <span class="material-symbols-rounded">inventory_2</span>
            <span class="nav-label">Estoque</span>
        </button>

        <button class="nav-item"
                data-page="entrega"
                data-label="Entrega de Ordem"
                onclick="showPage('entrega')">
            <span class="material-symbols-rounded">local_shipping</span>
            <span class="nav-label">Entrega de Ordem</span>
        </button>
    </nav>
</aside>

<script>
(function() {
    const LS_KEY  = 'sb_collapsed';
    let collapsed = localStorage.getItem(LS_KEY) === 'true';

    function applyState() {
        const sb  = document.getElementById('sidebar');
        const mc  = document.getElementById('main-content');
        if (!sb) return;
        if (collapsed) {
            sb.classList.add('sb-closed');
            mc?.classList.add('sb-collapsed');
        } else {
            sb.classList.remove('sb-closed');
            mc?.classList.remove('sb-collapsed');
        }
    }

    window.toggleSidebar = function() {
        if (window.innerWidth < 1024) {
            document.getElementById('sidebar')?.classList.toggle('mobile-open');
            return;
        }
        collapsed = !collapsed;
        localStorage.setItem(LS_KEY, collapsed);
        applyState();
    };

    // Intercepta showPage para atualizar nav ativo
    const _orig = window.showPage;
    window.showPage = function(page) {
        if (_orig) _orig(page);
        document.querySelectorAll('.nav-item[data-page]').forEach(el => {
            el.classList.toggle('active-nav', el.dataset.page === page);
        });
        if (window.innerWidth < 1024) {
            document.getElementById('sidebar')?.classList.remove('mobile-open');
        }
    };

    // Aplica estado inicial (sem animação)
    const sb = document.getElementById('sidebar');
    if (sb) sb.style.transition = 'none';
    applyState();
    requestAnimationFrame(() => {
        if (sb) sb.style.transition = '';
    });
})();
</script>
