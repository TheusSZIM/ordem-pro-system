<!-- ============================================
     CONTROLE DE ORDENS PRO - MODALS COMPONENT
     ============================================ -->

<!-- MODAL DE NOVA ORDEM -->
<div id="modal-overlay" class="fixed inset-0 modal-overlay z-[60] hidden opacity-0 transition-opacity duration-300" onclick="closeModal()"></div>

<div id="modal-container" class="fixed inset-0 z-[70] hidden flex items-center justify-center p-4 pointer-events-none">
    <div id="modal-content" class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-2xl transform scale-95 opacity-0 transition-all duration-300 pointer-events-auto max-h-[90vh] overflow-hidden flex flex-col">
        <!-- FORM DE NOVA ORDEM — com ID padronizado nos campos -->
        <div class="sticky top-0 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 p-6 z-10">
            <div class="flex items-center justify-between">
                <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Nova Ordem de Separação</h2>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
                    <span class="material-symbols-rounded text-3xl">close</span>
                </button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto p-6">
            <form id="nova-ordem-form" onsubmit="handleNewOrder(event)" class="space-y-5">

                <!-- Lote / Número da Ordem -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                        Número da Ordem / Lote *
                    </label>
                    <div class="relative">
                        <span class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">label</span>
                        <input type="text" id="numero-ordem" name="numero_ordem" required
                            placeholder="Ex: 123456"
                            autocomplete="off"
                            class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all placeholder:text-slate-400">
                    </div>
                    <p class="text-xs text-slate-400 mt-1">Este número será usado como identificador do lote</p>
                </div>

                <!-- Produto -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Produto *</label>
                    <input type="text" id="ordem-produto" required
                        placeholder="Ex: VBD904, ACW1648950..."
                        autocomplete="off"
                        class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all placeholder:text-slate-400">
                </div>

                <!-- Quantidade -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Quantidade *</label>
                    <input type="number" id="ordem-quantidade" required min="1"
                        placeholder="Ex: 100"
                        class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all placeholder:text-slate-400">
                </div>

                <!-- Data Prevista -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Data Prevista *</label>
                    <input type="date" id="ordem-data" required
                        class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all [color-scheme:light] dark:[color-scheme:dark]">
                    <script>
                        document.getElementById('ordem-data').value = new Date().toISOString().split('T')[0];
                    </script>
                </div>

                <!-- Operador -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Operador Responsável</label>
                    <select id="ordem-operador"
                        class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all">
                        <option value="">Selecione...</option>
                    </select>
                </div>

                <!-- Célula -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Célula/Estação</label>
                    <input type="text" id="ordem-celula"
                        placeholder="Ex: Célula 3, Linha A..."
                        autocomplete="off"
                        class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all placeholder:text-slate-400">
                </div>

                <!-- Tipo de Embalagem -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Tipo de Embalagem</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="flex items-center gap-3 p-3.5 bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 rounded-xl cursor-pointer hover:border-primary-500 transition-colors">
                            <input type="radio" name="tipo-embalagem" value="montadora" checked class="w-4 h-4 text-primary-600">
                            <div>
                                <p class="font-semibold text-slate-900 dark:text-white text-sm">Montadora</p>
                                <p class="text-xs text-slate-500">Envio direto à linha</p>
                            </div>
                        </label>
                        <label class="flex items-center gap-3 p-3.5 bg-slate-50 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 rounded-xl cursor-pointer hover:border-primary-500 transition-colors">
                            <input type="radio" name="tipo-embalagem" value="reposicao" class="w-4 h-4 text-primary-600">
                            <div>
                                <p class="font-semibold text-slate-900 dark:text-white text-sm">Reposição</p>
                                <p class="text-xs text-slate-500">Reposição de estoque</p>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Observações -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Observações</label>
                    <textarea id="ordem-observacoes" rows="2"
                        placeholder="Informações adicionais..."
                        class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all placeholder:text-slate-400 resize-none"></textarea>
                </div>

                <!-- Botões -->
                <div class="flex items-center justify-end gap-3 pt-2">
                    <button type="button" onclick="closeModal()"
                        class="px-6 py-2.5 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl font-semibold transition-colors">
                        Cancelar
                    </button>
                    <button type="submit" id="btn-criar-ordem"
                        class="px-6 py-2.5 bg-primary-600 hover:bg-primary-700 text-white rounded-xl font-bold flex items-center gap-2 shadow-lg shadow-primary-500/30 transition-all">
                        <span class="material-symbols-rounded">add</span>
                        Criar Ordem
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- MODAL DE DETALHES DA ORDEM -->
<div id="ordem-detail-modal" class="fixed inset-0 z-[80] hidden">
    <div class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity" onclick="closeOrdemDetail()"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
        <div id="ordem-detail-content" class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-3xl max-h-[90vh] overflow-hidden flex flex-col pointer-events-auto transform scale-95 opacity-0 transition-all duration-300">
        </div>
    </div>
</div>

<!-- MODAL DE FINALIZAÇÃO COM ETIQUETAS ZLP -->
<div id="finalizacao-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[90] flex items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto transform transition-all duration-300 scale-95 opacity-0" id="finalizacao-content">
        <div class="sticky top-0 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 p-6 z-10">
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-2xl font-bold text-slate-900 dark:text-white flex items-center gap-2">
                        <span class="material-symbols-rounded text-emerald-500">check_circle</span>
                        Finalizar Separação
                    </h2>
                    <p class="text-sm text-slate-600 dark:text-slate-400 mt-1" id="finalizacao-ordem-info"></p>
                </div>
                <button onclick="closeFinalizacaoModal()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
                    <span class="material-symbols-rounded text-3xl">close</span>
                </button>
            </div>
        </div>
        <div class="p-6 space-y-6">
            <div class="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
                <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-4 flex items-center gap-2">
                    <span class="w-8 h-8 rounded-full bg-primary-100 dark:bg-primary-900/30 text-primary-600 flex items-center justify-center text-sm font-bold">1</span>
                    Ordem Completa?
                </h3>
                <div class="flex gap-4">
                    <button onclick="setOrdemCompleta(true)" id="btn-completa-sim" class="flex-1 py-4 px-6 border-2 border-slate-300 dark:border-slate-600 rounded-xl font-semibold text-slate-600 dark:text-slate-400 hover:border-emerald-500 hover:bg-emerald-50 dark:hover:bg-emerald-900/20 hover:text-emerald-600 transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-rounded">check_circle</span>Sim, Completa
                    </button>
                    <button onclick="setOrdemCompleta(false)" id="btn-completa-nao" class="flex-1 py-4 px-6 border-2 border-slate-300 dark:border-slate-600 rounded-xl font-semibold text-slate-600 dark:text-slate-400 hover:border-amber-500 hover:bg-amber-50 dark:hover:bg-amber-900/20 hover:text-amber-600 transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-rounded">warning</span>Não, Faltam Itens
                    </button>
                </div>
            </div>
            <div id="itens-faltantes-area" class="hidden bg-amber-50 dark:bg-amber-900/20 rounded-xl p-6 border border-amber-200 dark:border-amber-800">
                <h4 class="text-md font-bold text-amber-900 dark:text-amber-400 mb-4 flex items-center gap-2">
                    <span class="material-symbols-rounded">inventory_2</span>Marque os Itens Faltantes
                </h4>
                <div id="itens-lista" class="space-y-3"></div>
            </div>
            <div class="bg-slate-50 dark:bg-slate-800/50 rounded-xl p-6 border border-slate-200 dark:border-slate-700">
                <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-4 flex items-center gap-2">
                    <span class="w-8 h-8 rounded-full bg-primary-100 dark:bg-primary-900/30 text-primary-600 flex items-center justify-center text-sm font-bold">2</span>
                    Embalagem Separada?
                </h3>
                <div class="flex gap-4">
                    <button onclick="setEmbalagemSeparada(true)" id="btn-embalagem-sim" class="flex-1 py-4 px-6 border-2 border-slate-300 dark:border-slate-600 rounded-xl font-semibold text-slate-600 dark:text-slate-400 hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20 hover:text-blue-600 transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-rounded">checkroom</span>Sim
                    </button>
                    <button onclick="setEmbalagemSeparada(false)" id="btn-embalagem-nao" class="flex-1 py-4 px-6 border-2 border-slate-300 dark:border-slate-600 rounded-xl font-semibold text-slate-600 dark:text-slate-400 hover:border-slate-500 hover:bg-slate-100 dark:hover:bg-slate-700 hover:text-slate-700 transition-all flex items-center justify-center gap-2">
                        <span class="material-symbols-rounded">close</span>Não
                    </button>
                </div>
            </div>
        </div>
        <div class="sticky bottom-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 p-6 flex items-center justify-between">
            <div class="text-sm text-slate-500 dark:text-slate-400">Responda todas as perguntas para continuar</div>
            <button onclick="concluirOrdemFinal()" id="btn-concluir-final" disabled
                class="px-6 py-3 bg-emerald-600 hover:bg-emerald-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white rounded-xl font-bold transition-all flex items-center gap-2 shadow-lg disabled:shadow-none">
                <span class="material-symbols-rounded">print</span>Concluir e Imprimir Etiquetas
            </button>
        </div>
    </div>
</div>

<div id="print-area" style="display:none;"></div>
<div id="toast-container"></div>

<script>
// Popula operadores quando o modal de nova ordem abrir
(function() {
    var _origShowModal = window.showModal;
    window.showModal = function() {
        if (_origShowModal) _origShowModal.apply(this, arguments);
        setTimeout(function() {
            if (typeof window.populateOperators === 'function') {
                window.populateOperators('ordem-operador');
            }
            var dataInput = document.getElementById('ordem-data');
            if (dataInput && !dataInput.value) {
                dataInput.value = new Date().toISOString().split('T')[0];
            }
            document.getElementById('numero-ordem')?.focus();
        }, 150);
    };
})();
</script>
