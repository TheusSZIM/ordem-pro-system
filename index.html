<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden selection:bg-primary-500 selection:text-white">

        <!-- Kanban Page -->

        <!-- Ordens Page -->

        <!-- Entrega Page -->

        <!-- Equipe Page -->

    <!-- Modals Component -->

    <!-- ============================================
         MODAL DE LOGIN
         ============================================ -->
    <div id="login-modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 hidden">
        <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-2xl w-full max-w-md p-8 m-4 animate-slide-up" onclick="event.stopPropagation()">
            <!-- Logo e Título -->
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-primary-600 to-primary-800 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <span class="material-symbols-rounded text-3xl text-white">inventory</span>
                </div>
                <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Bem-vindo de volta</h2>
                <p class="text-slate-500 dark:text-slate-400 mt-2">Faça login para acessar o sistema</p>
            </div>

            <!-- Formulário de Login -->
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-6">
                <!-- Email -->
                <div>
                    <label for="login-email" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                        Email
                    </label>
                    <div class="relative">
                        <span class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            mail
                        </span>
                        <input
                            type="email"
                            id="login-email"
                            name="email"
                            required
                            autocomplete="email"
                            class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                            placeholder="seu@email.com"
                        >
                    </div>
                </div>

                <!-- Senha -->
                <div>
                    <label for="login-password" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
                        Senha
                    </label>
                    <div class="relative">
                        <span class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                            lock
                        </span>
                        <input
                            type="password"
                            id="login-password"
                            name="password"
                            required
                            autocomplete="current-password"
                            class="w-full pl-11 pr-12 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:ring-2 focus:ring-primary-500 focus:border-transparent transition-all"
                            placeholder="••••••••"
                        >
                        <button
                            type="button"
                            onclick="togglePasswordVisibility()"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors"
                        >
                            <span class="material-symbols-rounded" id="password-toggle-icon">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Lembrar-me -->
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input
                            type="checkbox"
                            id="remember-me"
                            class="w-4 h-4 text-primary-600 bg-slate-50 dark:bg-slate-800 border-slate-300 dark:border-slate-600 rounded focus:ring-2 focus:ring-primary-500"
                        >
                        <span class="text-sm text-slate-600 dark:text-slate-400">Lembrar-me</span>
                    </label>
                    <button
                        type="button"
                        onclick="showForgotPassword()"
                        class="text-sm text-primary-600 hover:text-primary-700 font-medium"
                    >
                        Esqueceu a senha?
                    </button>
                </div>

                <!-- Mensagem de Erro -->
                <div id="login-error" class="hidden p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg">
                    <div class="flex items-center gap-2 text-red-600 dark:text-red-400 text-sm">
                        <span class="material-symbols-rounded text-lg">error</span>
                        <span id="login-error-message">Erro ao fazer login</span>
                    </div>
                </div>

                <!-- Botão de Login -->
                <button
                    type="submit"
                    id="login-submit-btn"
                    class="w-full py-3 bg-primary-600 hover:bg-primary-700 text-white rounded-xl font-semibold shadow-lg shadow-primary-500/30 hover:shadow-primary-500/50 transition-all duration-300 hover:-translate-y-0.5 flex items-center justify-center gap-2"
                >
                    <span id="login-btn-text">Entrar</span>
                    <span class="material-symbols-rounded" id="login-btn-icon">login</span>
                </button>
            </form>

            <!-- Credenciais de Teste (REMOVER EM PRODUÇÃO!) -->
            <div class="mt-6 p-4 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-lg">

                <div class="text-xs text-amber-700 dark:text-amber-500 space-y-1">
                    <p><strong>Admin:</strong> admin@ordemgro.com / admin123</p>

    <!-- JavaScript Modules - ORDEM CORRETA COM AUTENTICAÇÃO! -->

    <script src="js/app.js"></script>

    <!-- Scripts do Modal de Login -->
    <script>
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            
            const submitBtn = document.getElementById('login-submit-btn');
            const btnText = document.getElementById('login-btn-text');
            const btnIcon = document.getElementById('login-btn-icon');
            const errorDiv = document.getElementById('login-error');
            
            submitBtn.disabled = true;
            btnText.textContent = 'Entrando...';
            btnIcon.textContent = 'hourglass_empty';
            btnIcon.classList.add('animate-spin');
            errorDiv.classList.add('hidden');
            
            try {
                const result = await auth.login(email, password);
                
                if (result.success) {
                    hideLoginModal();
                    
                    // Recarregar página para carregar componentes
                    window.location.reload();
                } else {
                    throw new Error(result.message || 'Credenciais inválidas');
                }
            } catch (error) {
                console.error('❌ Erro no login:', error);
                
                const errorMessage = document.getElementById('login-error-message');
                errorMessage.textContent = error.message || 'Email ou senha incorretos';
                errorDiv.classList.remove('hidden');
                
                const form = document.getElementById('login-form');
                form.classList.add('animate-shake');
                setTimeout(() => form.classList.remove('animate-shake'), 500);
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Entrar';
                btnIcon.textContent = 'login';
                btnIcon.classList.remove('animate-spin');
            }
        }

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('login-password');
            const toggleIcon = document.getElementById('password-toggle-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        }

        function showForgotPassword() {
            alert('Funcionalidade de recuperação de senha em desenvolvimento.\nContate o administrador do sistema.');
        }

        function hideLoginModal() {
            const loginModal = document.getElementById('login-modal');
            if (loginModal) {
                loginModal.classList.remove('active');
                loginModal.classList.add('hidden');
            }
        }
    </script>

    <!-- CSS para Modal -->
    <style>
        #login-modal.active {
            display: flex !important;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .animate-shake {
            animation: shake 0.5s ease-in-out;
        }
    </style>

    <!-- Load Components -->
    <script>
        // Função para carregar componentes HTML
        async function loadComponent(url, containerId) {
            try {
                const response = await fetch(url);
                const html = await response.text();
                document.getElementById(containerId).innerHTML = html;
            } catch (error) {
                console.error(`Erro ao carregar componente ${url}:`, error);
            }
        }

        // Carregar todos os componentes
document.addEventListener('DOMContentLoaded', async () => {
    // ✅ PASSO 1: Iniciar autenticação PRIMEIRO
    console.log('🚀 Inicializando aplicação...');
    
    if (typeof auth !== 'undefined') {
        await auth.init();  // ✅ AGUARDAR completar
        
        // Se não autenticado, parar aqui e mostrar login
        if (!auth.isAuthenticated()) {
            console.log('⚠️ Usuário não autenticado, aguardando login...');
            return; // Não carregar componentes até fazer login
        }
    }
    
    // ✅ PASSO 2: Carregar componentes (apenas se autenticado)
    console.log('✅ Usuário autenticado, carregando componentes...');
    
    await Promise.all([
        loadComponent('components/header.html', 'header-container'),
        loadComponent('components/sidebar.html', 'sidebar-container'),
        loadComponent('components/modals.html', 'modals-container'),
        loadComponent('pages/dashboard.html', 'dashboard-container'),
        loadComponent('pages/kanban.html', 'kanban-container'),
        loadComponent('pages/ordens.html', 'ordens-container'),
        loadComponent('pages/entrega.html', 'entrega-container'),
        loadComponent('pages/equipe.html', 'equipe-container'),
        loadComponent('pages/estoque.html', 'estoque-container')
    ]);

    // ✅ PASSO 3: Inicializar aplicação após carregar componentes
    setTimeout(() => {
        if (typeof initTheme === 'function') initTheme();
        if (typeof renderRecentOrders === 'function') renderRecentOrders();
        if (typeof initCharts === 'function') initCharts();
        if (typeof animateCounters === 'function') animateCounters();
        if (typeof updateTime === 'function') {
            setInterval(updateTime, 1000);
            updateTime();
        }
        
        // Atualizar dashboard
        if (typeof updateDashboard === 'function') {
            updateDashboard();
            setInterval(updateDashboard, 30000);
        }
        
        // ✅ PASSO 4: Configurar UI autenticada
        if (typeof setupAuthenticatedUI === 'function') {
            setupAuthenticatedUI();
        }
    }, 100);
    
        });
    </script>
    
<script src="js/user-profile.js"></script>
