    <script>
        /* ── Bloqueia autocomplete e limpa inputs com URL antes de tudo ── */
        document.addEventListener('DOMContentLoaded', () => {
            // Roda imediatamente para pegar o search bar do header
            const clearUrls = () => {
                document.querySelectorAll('input').forEach(inp => {
                    inp.setAttribute('autocomplete', 'off');
                    if ((inp.value||'').includes('docs.google.com')) inp.value = '';
                });
            };
            clearUrls();
            // Roda novamente após componentes carregarem
            setTimeout(clearUrls, 500);
            setTimeout(clearUrls, 1500);
        });
    </script>

    <script>
        /* ── Login ── */
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const submitBtn = document.getElementById('login-submit-btn');
            const btnText = document.getElementById('login-btn-text');
            const btnIcon = document.getElementById('login-btn-icon');
            const errorDiv = document.getElementById('login-error');

            submitBtn.disabled = true;
            btnText.textContent = 'Entrando...';
            btnIcon.textContent = 'hourglass_empty';
            errorDiv.classList.add('hidden');

            try {
                const result = await auth.login(email, password);
                if (result.success) {
                    const lm = document.getElementById('login-modal');
                    if (lm) { lm.classList.add('hidden'); lm.classList.remove('active'); }
                    // Pequeno delay para garantir que a sessão foi salva
                    setTimeout(() => window.location.reload(), 150);
                } else {
                    throw new Error(result.message || 'Credenciais inválidas');
                }
            } catch (error) {
                document.getElementById('login-error-message').textContent = error.message;
                errorDiv.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Entrar';
                btnIcon.textContent = 'login';
            }
        }

        function togglePasswordVisibility() {
            const input = document.getElementById('login-password');
            const icon = document.getElementById('password-toggle-icon');
            if (input.type === 'password') { input.type = 'text'; icon.textContent = 'visibility_off'; }
            else { input.type = 'password'; icon.textContent = 'visibility'; }
        }

        function showForgotPassword() {
            alert('Recuperação de senha em desenvolvimento. Contate o administrador.');
        }

        /* ── loadComponent ── */
        async function loadComponent(url, containerId) {
            try {
                const r = await fetch(url);
                document.getElementById(containerId).innerHTML = await r.text();
            } catch (e) {
                console.error(`Erro ao carregar ${url}:`, e);
            }
        }

        /* ── Sidebar JS (roda após HTML ser injetado) ── */
        function initSidebar() {
            const LS = 'sb_mini';
            const W_OPEN = 280, W_MINI = 76;
            let mini = localStorage.getItem(LS) === 'true';

            function apply(animate) {
                const sb  = document.getElementById('sidebar');
                const tab = document.getElementById('sb-tab');
                const mc  = document.getElementById('main-content');
                if (!sb) return;
                if (!animate) { sb.style.transition = 'none'; if (tab) tab.style.transition = 'none'; }
                sb.classList.toggle('sb-mini', mini);
                mc?.classList.toggle('sb-mini', mini);
                if (tab) { tab.style.left = (mini ? W_MINI : W_OPEN) + 'px'; tab.classList.toggle('mini-tab', mini); }
                if (!animate) requestAnimationFrame(() => { sb.style.transition = ''; if (tab) tab.style.transition = ''; });
            }

            window.toggleSidebar = function () {
                if (window.innerWidth < 1024) { document.getElementById('sidebar')?.classList.toggle('mobile-open'); return; }
                mini = !mini;
                localStorage.setItem(LS, mini);
                apply(true);
            };

            apply(false);
            console.log('✅ Sidebar iniciada');
        }

        /* ── Inicialização principal ── */
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🚀 Inicializando...');

            if (typeof auth !== 'undefined') {
                await auth.init();
                if (!auth.isAuthenticated()) { console.log('⚠️ Aguardando login...'); return; }
            }

            console.log('✅ Autenticado — carregando componentes...');

            await Promise.all([
                loadComponent('components/header.html',  'header-container'),
                loadComponent('components/sidebar.html', 'sidebar-container'),
                loadComponent('components/modals.html',  'modals-container'),
                loadComponent('pages/dashboard.html',    'dashboard-container'),
                loadComponent('pages/kanban.html',       'kanban-container'),
                loadComponent('pages/ordens.html',       'ordens-container'),
                loadComponent('pages/entrega.html',      'entrega-container'),
                loadComponent('pages/equipe.html',       'equipe-container'),
                loadComponent('pages/estoque.html',      'estoque-container'),
                loadComponent('pages/configuracoes.html','configuracoes-container'),
            ]);

            // Esconde o modal de login após carregar tudo
            const lm = document.getElementById('login-modal');
            if (lm) { lm.classList.add('hidden'); lm.classList.remove('active'); }

            // Limpa qualquer input que possa ter URL de Sheets + desativa autocomplete
            requestAnimationFrame(() => {
                document.querySelectorAll('input[type="text"], input:not([type])').forEach(inp => {
                    inp.setAttribute('autocomplete', 'off');
                    inp.setAttribute('autocorrect',  'off');
                    // Limpa se o valor parecer uma URL do Sheets
                    if ((inp.value||'').includes('docs.google.com') ||
                        (inp.value||'').includes('spreadsheets')) {
                        inp.value = '';
                    }
                });
                // Garante que o search bar do header está limpo
                const gs = document.getElementById('global-search');
                if (gs) { gs.value = ''; gs.setAttribute('autocomplete','off'); }
            });

            // Sidebar precisa rodar após HTML injetado
            initSidebar();

            // Sobrescreve showPage para atualizar nav ativo
            const _origShowPage = window.showPage;
            window.showPage = function(page) {
                if (_origShowPage) _origShowPage(page);
                document.querySelectorAll('.nav-item[data-page]').forEach(el =>
                    el.classList.toggle('active-nav', el.dataset.page === page));
                if (window.innerWidth < 1024)
                    document.getElementById('sidebar')?.classList.remove('mobile-open');
            };

            setTimeout(() => {
                if (typeof initTheme            === 'function') initTheme();
                if (typeof loadSavedTheme       === 'function') loadSavedTheme();
                if (typeof renderRecentOrders   === 'function') renderRecentOrders();
                if (typeof initCharts           === 'function') initCharts();
                if (typeof animateCounters      === 'function') animateCounters();
                if (typeof updateTime           === 'function') { updateTime(); setInterval(updateTime, 1000); }
                if (typeof updateDashboard      === 'function') { updateDashboard(); setInterval(updateDashboard, 30000); }
                if (typeof setupAuthenticatedUI === 'function') setupAuthenticatedUI();
                if (typeof aplicarPermissoes       === 'function') aplicarPermissoes();
                if (typeof wrapShowPageComPermissao === 'function') wrapShowPageComPermissao();
            }, 100);
        });
    </script>
