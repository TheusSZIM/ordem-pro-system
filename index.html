                        scaleIn:{'0%':{opacity:'0',transform:'scale(0.9)'},'100%':{opacity:'1',transform:'scale(1)'}},
                        slideInRight:{'0%':{opacity:'0',transform:'translateX(20px)'},'100%':{opacity:'1',transform:'translateX(0)'}},
                    }

         MODAL LOGIN — Background animado

    <div id="login-modal" class="fixed inset-0 z-50 hidden" style="background:#060d1f;">

        <canvas id="login-canvas" class="absolute inset-0 w-full h-full" style="pointer-events:none;"></canvas>

        <div class="absolute inset-0" style="background:radial-gradient(ellipse at 50% 45%,rgba(99,102,241,.18) 0%,transparent 65%);pointer-events:none;"></div>

        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="w-full max-w-md" style="animation:slideUp .5s cubic-bezier(.16,1,.3,1) both;">
                <div class="rounded-2xl p-8"
                     style="background:rgba(8,16,35,.88);border:1px solid rgba(99,102,241,.22);backdrop-filter:blur(24px);box-shadow:0 30px 80px rgba(0,0,0,.8),0 0 60px rgba(99,102,241,.07);">

                    <div class="text-center mb-8">
                        <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 relative"
                             style="background:linear-gradient(135deg,#4338ca,#6366f1);box-shadow:0 0 40px rgba(99,102,241,.5);">
                            <span class="material-symbols-rounded text-3xl text-white">receipt_long</span>
                            <span class="absolute -top-1 -right-1 w-4 h-4 bg-emerald-500 rounded-full border-2 animate-pulse" style="border-color:#060d1f;"></span>
                        </div>
                        <h2 class="text-2xl font-bold text-white tracking-tight">Bem-vindo de volta</h2>
                        <p class="text-slate-500 mt-1.5 text-sm">Faça login para acessar o sistema</p>
                    </div>

                    <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">Email</label>
                            <div class="relative">
                                <span class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 text-slate-600 text-lg">mail</span>
                                <input type="email" id="login-email" required autocomplete="username"
                                    placeholder="seu@vetore.com"
                                    class="w-full pl-11 pr-4 py-3 rounded-xl text-white text-sm placeholder:text-slate-700 outline-none"
                                    style="background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.12);transition:border-color .2s,box-shadow .2s;"
                                    onfocus="this.style.borderColor='rgba(99,102,241,.6)';this.style.boxShadow='0 0 0 3px rgba(99,102,241,.15)'"
                                    onblur="this.style.borderColor='rgba(148,163,184,.12)';this.style.boxShadow='none'">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wider">Senha</label>
                            <div class="relative">
                                <span class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 text-slate-600 text-lg">lock</span>
                                <input type="password" id="login-password" required autocomplete="current-password"
                                    placeholder="••••••••"
                                    class="w-full pl-11 pr-12 py-3 rounded-xl text-white text-sm placeholder:text-slate-700 outline-none"
                                    style="background:rgba(255,255,255,.04);border:1px solid rgba(148,163,184,.12);transition:border-color .2s,box-shadow .2s;"
                                    onfocus="this.style.borderColor='rgba(99,102,241,.6)';this.style.boxShadow='0 0 0 3px rgba(99,102,241,.15)'"
                                    onblur="this.style.borderColor='rgba(148,163,184,.12)';this.style.boxShadow='none'">
                                <button type="button" onclick="togglePasswordVisibility()"
                                    class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-600 hover:text-slate-300 transition-colors">
                                    <span class="material-symbols-rounded text-lg" id="password-toggle-icon">visibility</span>
                                </button>
                            </div>
                        </div>

                        <div id="login-error" class="hidden p-3 rounded-xl flex items-center gap-2 text-sm text-red-400"

    <script>
        /* ── Bloqueia autocomplete em inputs com URLs ── */
        document.addEventListener('DOMContentLoaded', function() {
            var clearInputs = function() {
                document.querySelectorAll('input').forEach(function(inp) {
                    inp.setAttribute('autocomplete','off');
                    if ((inp.value||'').includes('docs.google.com')) inp.value = '';
                });
            };
            clearInputs();
            setTimeout(clearInputs, 600);
        });

        /* ── Login ── */
        async function handleLogin(event) {
            event.preventDefault();
            var email    = document.getElementById('login-email').value;
            var password = document.getElementById('login-password').value;
            var submitBtn = document.getElementById('login-submit-btn');
            var btnText   = document.getElementById('login-btn-text');
            var btnIcon   = document.getElementById('login-btn-icon');
            var errorDiv  = document.getElementById('login-error');

            submitBtn.disabled = true;
            btnText.textContent = 'Entrando...';
            btnIcon.textContent = 'hourglass_empty';
            errorDiv.classList.add('hidden');

            try {
                var result = await auth.login(email, password);
                if (result.success) {
                    var lm = document.getElementById('login-modal');
                    if (lm) { lm.classList.add('hidden'); lm.style.display = 'none'; }
                    setTimeout(function(){ window.location.reload(); }, 150);
                } else {
                    throw new Error(result.message || 'Credenciais inválidas');
                }
            } catch(error) {
                document.getElementById('login-error-message').textContent = error.message;
                errorDiv.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Entrar';
                btnIcon.textContent = 'login';
            }
        }

        function togglePasswordVisibility() {
            var input = document.getElementById('login-password');
            var icon  = document.getElementById('password-toggle-icon');
            if (input.type === 'password') { input.type = 'text'; icon.textContent = 'visibility_off'; }
            else { input.type = 'password'; icon.textContent = 'visibility'; }
        }

        function showForgotPassword() {
            alert('Recuperação de senha em desenvolvimento. Contate o administrador.');
        }

        /* ── loadComponent ── */
        async function loadComponent(url, containerId) {
            try {
                var r = await fetch(url);
                document.getElementById(containerId).innerHTML = await r.text();
            } catch(e) { console.error('Erro ao carregar ' + url + ':', e); }
        }

        /* ── Sidebar JS ── */
        function initSidebar() {
            var LS = 'sb_mini', W_OPEN = 280, W_MINI = 76;
            var mini = localStorage.getItem(LS) === 'true';
            function apply(animate) {
                var sb  = document.getElementById('sidebar');
                var tab = document.getElementById('sb-tab');
                var mc  = document.getElementById('main-content');
                if (!sb) return;
                if (!animate) { sb.style.transition='none'; if(tab) tab.style.transition='none'; }
                sb.classList.toggle('sb-mini', mini);
                if (mc) mc.classList.toggle('sb-mini', mini);
                if (tab) { tab.style.left=(mini?W_MINI:W_OPEN)+'px'; tab.classList.toggle('mini-tab',mini); }
                if (!animate) requestAnimationFrame(function(){ sb.style.transition=''; if(tab) tab.style.transition=''; });
            }
            window.toggleSidebar = function() {
                if (window.innerWidth < 1024) { document.getElementById('sidebar')?.classList.toggle('mobile-open'); return; }
                mini = !mini; localStorage.setItem(LS, mini); apply(true);
            };
            apply(false);
            console.log('✅ Sidebar iniciada');
        }

        /* ── Inicialização principal ── */
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🚀 Inicializando...');

            if (typeof auth !== 'undefined') {
                await auth.init();
                if (!auth.isAuthenticated()) { console.log('⚠️ Aguardando login...'); return; }
            }

            console.log('✅ Autenticado — carregando componentes...');

            var lm = document.getElementById('login-modal');
            if (lm) { lm.classList.add('hidden'); lm.style.display='none'; }

            await Promise.all([
                loadComponent('components/header.html',   'header-container'),
                loadComponent('components/sidebar.html',  'sidebar-container'),
                loadComponent('components/modals.html',   'modals-container'),
                loadComponent('pages/dashboard.html',     'dashboard-container'),
                loadComponent('pages/kanban.html',        'kanban-container'),
                loadComponent('pages/ordens.html',        'ordens-container'),
                loadComponent('pages/entrega.html',       'entrega-container'),
                loadComponent('pages/equipe.html',        'equipe-container'),
                loadComponent('pages/estoque.html',       'estoque-container'),
                loadComponent('pages/configuracoes.html', 'configuracoes-container'),
                // ✅ NOVO: Separação
                loadComponent('pages/separacao.html',     'separacao-container'),
            ]);

            initSidebar();

            var _origShowPage = window.showPage;
            window.showPage = function(page) {
                if (_origShowPage) _origShowPage(page);
                document.querySelectorAll('.nav-item[data-page]').forEach(function(el) {
                    el.classList.toggle('active-nav', el.dataset.page === page);
                });
                if (window.innerWidth < 1024) document.getElementById('sidebar')?.classList.remove('mobile-open');
                // ✅ Dispara evento para módulos de página (kanban, separacao, etc.)
                document.dispatchEvent(new CustomEvent('pageChanged', { detail: page }));
            };

            setTimeout(function() {
                if (typeof initTheme            === 'function') initTheme();
                if (typeof loadSavedTheme       === 'function') loadSavedTheme();
                if (typeof renderRecentOrders   === 'function') renderRecentOrders();
                if (typeof initCharts           === 'function') initCharts();
                if (typeof animateCounters      === 'function') animateCounters();
                if (typeof updateTime           === 'function') { updateTime(); setInterval(updateTime, 1000); }
                if (typeof updateDashboard      === 'function') { updateDashboard(); setInterval(updateDashboard, 30000); }
                if (typeof setupAuthenticatedUI === 'function') setupAuthenticatedUI();
                if (typeof aplicarPermissoes    === 'function') aplicarPermissoes();
                if (typeof wrapShowPageComPermissao === 'function') wrapShowPageComPermissao();

                document.querySelectorAll('input').forEach(function(inp) {
                    inp.setAttribute('autocomplete','off');
                    if ((inp.value||'').includes('docs.google.com')) inp.value = '';
                });
                var gs = document.getElementById('global-search');
                if (gs) gs.value = '';

                setTimeout(function() {
                    if (typeof setDashLayout === 'function') {
                        var saved = (function(){
                            try {
                                var s = JSON.parse(localStorage.getItem('ordem_pro_session')||'{}');
                                var uid = s && s.user && s.user.id ? s.user.id : 'guest';
                                return localStorage.getItem('dash_layout_'+uid) || 'classic';
                            } catch(e){ return 'classic'; }
                        })();
                        setDashLayout(saved);
                    }
                    if (typeof updateTime    === 'function') { updateTime(); setInterval(updateTime, 1000); }
                    if (typeof dashUpdateAll === 'function') dashUpdateAll();
                }, 300);
            }, 100);
        });
    </script>

    <!-- ══ Canvas animado do login ══ -->
    <script>
    (function() {
        var raf, boxes, W, H;
        function startCanvas() {
            var canvas = document.getElementById('login-canvas');
            if (!canvas) return;
            var ctx = canvas.getContext('2d');
            W = canvas.width  = window.innerWidth;
            H = canvas.height = window.innerHeight;
            boxes = [];
            for (var i = 0; i < 30; i++) {
                boxes.push({
                    x: Math.random()*W, y: Math.random()*H,
                    s: Math.random()*36+10,
                    vx:(Math.random()-.5)*.42, vy:(Math.random()-.5)*.42,
                    rot:Math.random()*Math.PI*2, rv:(Math.random()-.5)*.005,
                    a: Math.random()*.06+.02,
                    hue: Math.random()>.5?245:262
                });
            }
            window.addEventListener('resize', function() {
                W = canvas.width  = window.innerWidth;
                H = canvas.height = window.innerHeight;
            });
            function tick() {
                ctx.clearRect(0,0,W,H);
                for (var i=0; i<boxes.length; i++) {
                    var b = boxes[i];
                    b.x+=b.vx; b.y+=b.vy; b.rot+=b.rv;
                    if(b.x<-b.s) b.x=W+b.s; if(b.x>W+b.s) b.x=-b.s;
                    if(b.y<-b.s) b.y=H+b.s; if(b.y>H+b.s) b.y=-b.s;
                    ctx.save();
                    ctx.translate(b.x,b.y); ctx.rotate(b.rot);
                    ctx.strokeStyle='hsla('+b.hue+',75%,65%,'+b.a+')';
                    ctx.lineWidth=1;
                    ctx.strokeRect(-b.s/2,-b.s/2,b.s,b.s);
                    ctx.strokeStyle='hsla('+b.hue+',75%,65%,'+(b.a*.35)+')';
                    ctx.strokeRect(-b.s/4,-b.s/4,b.s/2,b.s/2);
                    ctx.restore();
                }
                for (var i=0; i<boxes.length; i++) {
                    for (var j=i+1; j<boxes.length; j++) {
                        var dx=boxes[i].x-boxes[j].x, dy=boxes[i].y-boxes[j].y;
                        var d=Math.sqrt(dx*dx+dy*dy);
                        if(d<155){
                            ctx.beginPath();
                            ctx.moveTo(boxes[i].x,boxes[i].y);
                            ctx.lineTo(boxes[j].x,boxes[j].y);
                            ctx.strokeStyle='rgba(99,102,241,'+(0.07*(1-d/155))+')';
                            ctx.lineWidth=.5; ctx.stroke();
                        }
                    }
                }
                raf = requestAnimationFrame(tick);
            }
            if(raf) cancelAnimationFrame(raf);
            tick();
        }
        var observer = new MutationObserver(function() {
            var m = document.getElementById('login-modal');
            if (m && !m.classList.contains('hidden') && m.style.display !== 'none') {
                setTimeout(startCanvas, 50);
            }
        });
        document.addEventListener('DOMContentLoaded', function() {
            observer.observe(document.body, {subtree:true, attributes:true, attributeFilter:['class','style']});
            var m = document.getElementById('login-modal');
            if (m && !m.classList.contains('hidden')) setTimeout(startCanvas, 100);
        });
    })();
    </script>
