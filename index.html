 <script src="js/supabase-config.js"></script>

<script src="js/app.js"></script>

    <!-- Load Components -->
    <script>
        // Função para carregar componentes HTML
        async function loadComponent(url, containerId) {
            try {
                const response = await fetch(url);
                const html = await response.text();
                document.getElementById(containerId).innerHTML = html;
            } catch (error) {
                console.error(`Erro ao carregar componente ${url}:`, error);
            }
        }

        // Carregar todos os componentes
        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                loadComponent('components/header.html', 'header-container'),
                loadComponent('components/sidebar.html', 'sidebar-container'),
                loadComponent('components/modals.html', 'modals-container'),
                loadComponent('pages/dashboard.html', 'dashboard-container'),
                loadComponent('pages/kanban.html', 'kanban-container'),
                loadComponent('pages/ordens.html', 'ordens-container'),
                loadComponent('pages/entrega.html', 'entrega-container'),
                loadComponent('pages/equipe.html', 'equipe-container'),
                loadComponent('pages/estoque.html', 'estoque-container')
            ]);

            // Inicializar aplicação após carregar componentes
            setTimeout(() => {
                if (typeof initTheme === 'function') initTheme();
                if (typeof renderRecentOrders === 'function') renderRecentOrders();
                if (typeof initCharts === 'function') initCharts();
                if (typeof animateCounters === 'function') animateCounters();
                if (typeof updateTime === 'function') {
                    setInterval(updateTime, 1000);
                    updateTime();
                }
            }, 100);
        });
    </script>
