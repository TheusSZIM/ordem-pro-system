<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordem Pro | Sistema de Controle de Ordens</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- JsBarcode for ZPL labels -->
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind Config -->
    <script src="./src/config/tailwind-config.js"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="./src/css/styles.css">
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">
    
    <!-- Main App Container -->
    <div id="app" class="min-h-screen">
        <!-- Content will be injected by app.js -->
    </div>

    <!-- Modals Container -->
    <div id="modals-container"></div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed top-4 right-4 z-[9999] space-y-2"></div>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- App Configuration -->
    <script src="./src/config/supabase.js"></script>
    
    <!-- Utilities -->
    <script src="./src/utils/helpers.js"></script>
    <script src="./src/utils/storage.js"></script>
    
    <!-- Core Modules -->
    <script src="./src/js/theme.js"></script>
    <script src="./src/js/orders.js"></script>
    <script src="./src/js/charts.js"></script>
    <script src="./src/js/modals.js"></script>
    <script src="./src/js/print.js"></script>
    <script src="./src/js/notifications.js"></script>
    
    <!-- Main App -->
    <script src="./src/js/app.js"></script>
</body>
</html>
