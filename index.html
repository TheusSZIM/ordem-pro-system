                        Vetore · Controle Pro Enterprise + ZLP
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Canvas animado de quadrados -->
    <script>
    (function() {
        function startCanvas() {
            const canvas = document.getElementById('login-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let W = canvas.width  = window.innerWidth;
            let H = canvas.height = window.innerHeight;
            window.addEventListener('resize', () => {
                W = canvas.width  = window.innerWidth;
                H = canvas.height = window.innerHeight;
            });
            const N = 32;
            const boxes = Array.from({length: N}, () => ({
                x:    Math.random() * W,
                y:    Math.random() * H,
                s:    Math.random() * 40 + 10,
                vx:   (Math.random() - .5) * .45,
                vy:   (Math.random() - .5) * .45,
                rot:  Math.random() * Math.PI * 2,
                rv:   (Math.random() - .5) * .006,
                a:    Math.random() * .06 + .015,
                hue:  Math.random() > .5 ? 245 : 262,
            }));
            function tick() {
                ctx.clearRect(0, 0, W, H);
                boxes.forEach(b => {
                    b.x += b.vx; b.y += b.vy; b.rot += b.rv;
                    if (b.x < -b.s) b.x = W + b.s;
                    if (b.x > W+b.s) b.x = -b.s;
                    if (b.y < -b.s) b.y = H + b.s;
                    if (b.y > H+b.s) b.y = -b.s;
                    ctx.save();
                    ctx.translate(b.x, b.y);
                    ctx.rotate(b.rot);
                    ctx.strokeStyle = `hsla(${b.hue},75%,65%,${b.a})`;
                    ctx.lineWidth   = 1;
                    ctx.strokeRect(-b.s/2, -b.s/2, b.s, b.s);
                    ctx.strokeStyle = `hsla(${b.hue},75%,65%,${b.a*.4})`;
                    ctx.strokeRect(-b.s/4, -b.s/4, b.s/2, b.s/2);
                    ctx.restore();
                });
                // Conexões
                for (let i=0;i<boxes.length;i++) for (let j=i+1;j<boxes.length;j++) {
                    const dx=boxes[i].x-boxes[j].x, dy=boxes[i].y-boxes[j].y;
                    const d=Math.sqrt(dx*dx+dy*dy);
                    if (d<170) {
                        ctx.beginPath();
                        ctx.moveTo(boxes[i].x,boxes[i].y);
                        ctx.lineTo(boxes[j].x,boxes[j].y);
                        ctx.strokeStyle=`rgba(99,102,241,${.07*(1-d/170)})`;
                        ctx.lineWidth=.5;
                        ctx.stroke();
                    }
                }
                requestAnimationFrame(tick);
            }
            tick();
        }
        // Inicia imediatamente se o canvas já existir
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', startCanvas);
        } else {
            startCanvas();
        }
        // Re-inicia se o modal for exibido
        const _orig = window.showLoginModal;
        window.showLoginModal = function() {
            if (_orig) _orig();
            setTimeout(startCanvas, 50);
        };
    })();
    </script>
