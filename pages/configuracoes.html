<!-- CONFIGURAÇÕES PAGE -->
<div id="configuracoes" class="page hidden p-6 max-w-3xl mx-auto space-y-6">

    <div class="animate-fade-in">
        <h2 class="text-2xl font-bold text-slate-900 dark:text-white flex items-center gap-2">
            <span class="material-symbols-rounded text-primary-500">settings</span>
            Configurações da Conta
        </h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm mt-0.5">Altere sua senha e preferências</p>
    </div>

    <!-- PERFIL — visível para todos os níveis com login -->
    <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-soft overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex items-center gap-3">
            <span class="material-symbols-rounded text-primary-500">person</span>
            <h3 class="font-bold text-slate-900 dark:text-white">Meu Perfil</h3>
        </div>
        <div class="p-6 space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

                <!-- Nome: Admin pode editar; outros apenas visualizam -->
                <div class="sm:col-span-2">
                    <label class="block text-xs font-semibold text-slate-500 mb-1.5">Nome completo</label>
                    <input id="cfg-nome" type="text" placeholder="Seu nome"
                        class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm outline-none focus:border-primary-500 dark:text-white">
                </div>

                <div class="sm:col-span-2">
                    <label class="block text-xs font-semibold text-slate-500 mb-1.5">E-mail / Login</label>
                    <input id="cfg-email" type="text" readonly
                        class="w-full px-3 py-2.5 bg-slate-100 dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700 rounded-xl text-sm dark:text-white opacity-60 cursor-not-allowed">
                    <p id="cfg-email-hint" class="text-xs text-slate-400 mt-1"></p>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1.5">Cargo</label>
                    <input id="cfg-cargo" type="text" placeholder="Seu cargo" readonly
                        class="w-full px-3 py-2.5 bg-slate-100 dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700 rounded-xl text-sm dark:text-white opacity-60 cursor-not-allowed">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1.5">Nível de acesso</label>
                    <div class="px-3 py-2.5 bg-slate-100 dark:bg-slate-800/60 border border-slate-200 dark:border-slate-700 rounded-xl text-sm dark:text-slate-400 opacity-70">
                        <span id="cfg-nivel-label">—</span>
                        <span class="text-xs text-slate-400 ml-2">(somente Admin altera)</span>
                    </div>
                </div>
            </div>

            <!-- Botão Salvar — só Admin pode editar perfil completo -->
            <div id="cfg-salvar-perfil-wrap" class="justify-end pt-2 hidden" style="display:none!important">
                <button id="btn-salvar-perfil" onclick="salvarPerfil()"
                    class="px-6 py-2.5 bg-primary-600 hover:bg-primary-700 text-white rounded-xl text-sm font-bold transition-colors flex items-center gap-2">
                    <span class="material-symbols-rounded text-sm">save</span>
                    Salvar Perfil
                </button>
            </div>
        </div>
    </div>

    <!-- TROCA DE SENHA — disponível para TODOS -->
    <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-soft overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex items-center gap-3">
            <span class="material-symbols-rounded text-amber-500">lock</span>
            <h3 class="font-bold text-slate-900 dark:text-white">Alterar Senha</h3>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">Senha atual *</label>
                <div class="relative">
                    <span class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock</span>
                    <input id="cfg-senha-atual" type="password" placeholder="••••••••"
                        oninput="this.classList.remove('border-red-500')"
                        class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm outline-none focus:border-primary-500 dark:text-white transition-colors">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">Nova senha *</label>
                <div class="relative">
                    <span class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock_open</span>
                    <input id="cfg-nova-senha" type="password" placeholder="Mín. 6 caracteres"
                        oninput="atualizarForcaSenha(this.value)"
                        class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm outline-none focus:border-primary-500 dark:text-white">
                </div>
                <div class="mt-2 flex items-center gap-2">
                    <div class="flex-1 h-1.5 bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
                        <div id="forca-bar" class="h-full rounded-full transition-all duration-300" style="width:0%;background:#ef4444;"></div>
                    </div>
                    <span id="forca-label" class="text-xs font-semibold w-16 text-right"></span>
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">Confirmar nova senha *</label>
                <div class="relative">
                    <span class="material-symbols-rounded absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">lock_open</span>
                    <input id="cfg-confirma-senha" type="password" placeholder="Repita a nova senha"
                        class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm outline-none focus:border-primary-500 dark:text-white">
                </div>
            </div>
            <div class="p-3 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800/40 rounded-xl text-xs text-amber-700 dark:text-amber-400">
                💡 Use letras maiúsculas, números e símbolos — ex: <strong>Vetore@2025</strong>
            </div>
            <div class="flex justify-end pt-1">
                <button id="btn-trocar-senha" onclick="trocarSenha()"
                    class="px-6 py-2.5 bg-amber-500 hover:bg-amber-600 text-white rounded-xl text-sm font-bold transition-colors flex items-center gap-2">
                    <span class="material-symbols-rounded text-sm">lock_reset</span>
                    Alterar Minha Senha
                </button>
            </div>
        </div>
    </div>

    <!-- TEMA — disponível para todos com login -->
    <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-soft overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-100 dark:border-slate-800 flex items-center gap-3">
            <span class="material-symbols-rounded text-violet-500">palette</span>
            <h3 class="font-bold text-slate-900 dark:text-white">Personalização</h3>
        </div>
        <div class="p-6">
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">Escolha o tema de cores do sistema</p>
            <button onclick="openPersonalizacao()"
                class="flex items-center gap-2 px-4 py-2.5 bg-violet-600 hover:bg-violet-700 text-white rounded-xl text-sm font-bold transition-colors">
                <span class="material-symbols-rounded text-sm">palette</span>
                Abrir Personalização
            </button>
        </div>
    </div>
</div>
