<!-- ============================================
     CONTROLE DE ORDENS PRO - ORDENS LIST PAGE
     ============================================ -->

<!-- ORDENS LIST PAGE COM ABAS -->
<div id="ordens" class="page hidden p-6 space-y-6">
    <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 animate-fade-in">
        <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Lista de Ordens</h2>
        
        <div class="flex gap-3">
            <div class="relative">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
                    <span class="material-symbols-rounded">search</span>
                </span>
                <input type="text" 
                       id="search-ordens" 
                       placeholder="Buscar ordens..." 
                       class="pl-10 pr-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 dark:text-white w-64"
                       onkeyup="filterOrdens()">
            </div>
            <button onclick="showModal('new-order')" class="px-4 py-2 bg-primary-600 text-white rounded-lg text-sm font-semibold hover:bg-primary-700 transition-colors flex items-center gap-2">
                <span class="material-symbols-rounded text-sm">add</span>
                Nova
            </button>
        </div>
    </div>

    <!-- ABAS DE FILTRO -->
    <div class="bg-white dark:bg-slate-900 rounded-2xl p-2 border border-slate-200 dark:border-slate-800 shadow-soft">
        <div class="flex flex-wrap gap-2" id="ordens-tabs">
            <button onclick="setOrdensTab('pending')" data-tab="pending" class="ordens-tab px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200 bg-primary-100 dark:bg-primary-900/30 text-primary-700 dark:text-primary-400">
                <span class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-amber-500"></span>
                    Pendente Separação
                    <span class="ml-1 px-2 py-0.5 bg-white dark:bg-slate-800 text-xs rounded-full" id="count-pending">0</span>
                </span>
            </button>
            
            <button onclick="setOrdensTab('progress')" data-tab="progress" class="ordens-tab px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800">
                <span class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                    Em Separação
                    <span class="ml-1 px-2 py-0.5 bg-slate-200 dark:bg-slate-700 text-xs rounded-full" id="count-progress">0</span>
                </span>
            </button>
            
            <button onclick="setOrdensTab('completed')" data-tab="completed" class="ordens-tab px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800">
                <span class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                    Ordens Prontas
                    <span class="ml-1 px-2 py-0.5 bg-slate-200 dark:bg-slate-700 text-xs rounded-full" id="count-completed">0</span>
                </span>
            </button>
            
            <button onclick="setOrdensTab('delivered')" data-tab="delivered" class="ordens-tab px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800">
                <span class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-violet-500"></span>
                    Entregues
                    <span class="ml-1 px-2 py-0.5 bg-slate-200 dark:bg-slate-700 text-xs rounded-full" id="count-delivered">0</span>
                </span>
            </button>
            
            <button onclick="setOrdensTab('all')" data-tab="all" class="ordens-tab px-4 py-2 rounded-xl text-sm font-medium transition-all duration-200 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800">
                <span class="flex items-center gap-2">
                    <span class="material-symbols-rounded text-sm">apps</span>
                    Totais
                    <span class="ml-1 px-2 py-0.5 bg-slate-200 dark:bg-slate-700 text-xs rounded-full" id="count-all">0</span>
                </span>
            </button>
        </div>
    </div>

    <!-- TABELA DE ORDENS -->
    <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-soft overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-slate-50 dark:bg-slate-800/50">
                    <tr>
                        <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">ID</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Produto</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Quantidade</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Cliente</th>
                        <th class="px-6 py-4 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Data/Hora Início</th>
                        <th class="px-6 py-4 text-right text-xs font-bold text-slate-500 uppercase tracking-wider">Ações</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100 dark:divide-slate-800" id="ordens-table-body">
                </tbody>
            </table>
        </div>
        
        <div class="px-6 py-4 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between">
            <p class="text-sm text-slate-500" id="ordens-pagination-info">Mostrando 0 ordens</p>
            <div class="flex gap-2" id="ordens-pagination">
            </div>
        </div>
    </div>
</div>
