<!-- ============================================
     CONTROLE DE ORDENS PRO - ENTREGA PAGE
     ============================================ -->

<!-- ENTREGA DE ORDEM PAGE -->
<div id="entrega" class="page hidden p-6 space-y-6">
    <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 animate-fade-in">
        <div>
            <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Entrega de Ordem</h2>
            <p class="text-slate-500 dark:text-slate-400">Registre a saída de ordens concluídas</p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 bg-white dark:bg-slate-900 rounded-2xl p-6 border border-slate-200 dark:border-slate-800 shadow-soft">
            <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-4">Registrar Saída</h3>
            <form id="entrega-form" class="space-y-4" onsubmit="handleEntrega(event)">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Número da Ordem *</label>
                        <input type="text" 
                               id="entrega-ordem"
                               placeholder="Ex: ORD-2024-001" 
                               class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:text-white transition-all"
                               required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Data de Saída *</label>
                        <input type="date" 
                               id="entrega-data"
                               class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:text-white transition-all [color-scheme:light] dark:[color-scheme:dark]"
                               required>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Responsável pela Entrega *</label>
                    <input type="text" 
                           id="entrega-responsavel"
                           placeholder="Nome do motorista/transportador..." 
                           class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:text-white transition-all"
                           required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5">Observações</label>
                    <textarea id="entrega-obs" 
                              rows="3"
                              placeholder="Informações adicionais sobre a entrega..." 
                              class="w-full px-3 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent dark:text-white transition-all resize-none"></textarea>
                </div>

                <div class="flex items-center gap-2 pt-2">
                    <input type="checkbox" id="entrega-confirm" class="w-4 h-4 text-primary-600 border-slate-300 rounded focus:ring-primary-500" required>
                    <label for="entrega-confirm" class="text-sm text-slate-700 dark:text-slate-300">
                        Confirmo que a ordem foi conferida e está pronta para saída *
                    </label>
                </div>

                <div class="pt-4">
                    <button type="submit" class="w-full px-6 py-3 bg-primary-600 hover:bg-primary-700 text-white rounded-xl text-sm font-semibold shadow-lg shadow-primary-500/30 hover:shadow-primary-500/50 transition-all duration-300 flex items-center justify-center gap-2">
                        <span class="material-symbols-rounded">local_shipping</span>
                        Registrar Saída
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-white dark:bg-slate-900 rounded-2xl p-6 border border-slate-200 dark:border-slate-800 shadow-soft">
            <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-4">Ordens Concluídas</h3>
            <div class="space-y-3 max-h-[500px] overflow-y-auto" id="ordens-entrega-list">
            </div>
        </div>
    </div>
</div>
