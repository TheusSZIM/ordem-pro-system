<!-- EQUIPE PAGE -->
<div id="equipe" class="page hidden p-6 space-y-6">

    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 animate-fade-in">
        <div>
            <h2 class="text-2xl font-bold text-slate-900 dark:text-white flex items-center gap-2">
                <span class="material-symbols-rounded text-primary-500">group</span>
                Equipe
            </h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-0.5">
                Gerencie os usuários do sistema
                <span id="equipe-count" class="ml-2 px-2 py-0.5 bg-slate-100 dark:bg-slate-800 rounded-full text-xs font-bold text-slate-600 dark:text-slate-300">0</span>
            </p>
        </div>
        <button onclick="abrirNovoUsuario()"
            class="flex items-center gap-2 px-5 py-2.5 bg-primary-600 hover:bg-primary-700 text-white rounded-xl text-sm font-bold transition-colors shadow-lg shadow-primary-500/30">
            <span class="material-symbols-rounded">person_add</span>
            Novo Usuário
        </button>
    </div>

    <!-- LEGENDA NÍVEIS -->
    <div class="flex flex-wrap gap-2 items-center">
        <span class="text-xs text-slate-400 font-semibold">Níveis:</span>
        <span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:rgba(100,116,139,.15);color:#64748b">1 · Operador</span>
        <span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:rgba(59,130,246,.15);color:#3b82f6">2 · Coordenador</span>
        <span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:rgba(139,92,246,.15);color:#8b5cf6">3 · Gestor</span>
        <span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:rgba(239,68,68,.15);color:#ef4444">4 · Admin</span>
        <span class="text-xs text-slate-400 ml-2">🔒 = e-mail virtual interno</span>
    </div>

    <!-- TABELA -->
    <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-soft overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-slate-50 dark:bg-slate-800/50">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Usuário</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Nível</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Cargo</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Célula</th>
                        <th class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Último acesso</th>
                        <th class="px-4 py-3 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Ações</th>
                    </tr>
                </thead>
                <tbody id="equipe-tbody" class="divide-y divide-slate-100 dark:divide-slate-800">
                    <tr><td colspan="6" class="text-center py-10 text-slate-400">
                        <span class="material-symbols-rounded text-3xl block mb-2 opacity-30">group</span>
                        Carregando...
                    </td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
