     ============================================ -->

<!-- ESTOQUE PAGE -->
<div id="estoque" class="page hidden p-6 space-y-6">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Controle de Estoque</h2>
            <p class="text-slate-500 dark:text-slate-400">Gestão de produtos e reposições</p>
        </div>
        <div class="flex gap-2">
            <button class="px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-sm font-semibold hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
                Exportar
            </button>
            <button class="px-4 py-2 bg-primary-600 text-white rounded-lg text-sm font-semibold hover:bg-primary-700 transition-colors">
                + Produto
            </button>
        </div>
    </div>

    <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-soft overflow-hidden">
        <div class="p-4 border-b border-slate-100 dark:border-slate-800 flex gap-4">
            <input type="text" placeholder="Buscar produto..." class="flex-1 px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm dark:text-white">
            <select class="px-4 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm dark:text-white">
                <option>Todos</option>
                <option>Em falta</option>
                <option>Crítico</option>
            </select>
        </div>
        <table class="w-full">
            <thead class="bg-slate-50 dark:bg-slate-800/50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase">SKU</th>
                    <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase">Produto</th>
                    <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase">Quantidade</th>
                    <th class="px-6 py-3 text-left text-xs font-bold text-slate-500 uppercase">Status</th>
                    <th class="px-6 py-3 text-right text-xs font-bold text-slate-500 uppercase">Ações</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-100 dark:divide-slate-800">
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                    <td class="px-6 py-4 text-sm font-medium text-slate-900 dark:text-white">TX-900</td>
                    <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-300">Industrial Sensor</td>
                    <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-300">234 un</td>
                    <td class="px-6 py-4"><span class="px-2 py-1 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 text-xs rounded-full">OK</span></td>
                    <td class="px-6 py-4 text-right">
                        <button class="text-slate-400 hover:text-primary-600"><span class="material-symbols-rounded">edit</span></button>
                    </td>
                </tr>
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                    <td class="px-6 py-4 text-sm font-medium text-slate-900 dark:text-white">VL-X2</td>
                    <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-300">Válvula de Controle</td>
                    <td class="px-6 py-4 text-sm text-slate-600 dark:text-slate-300">12 un</td>
                    <td class="px-6 py-4"><span class="px-2 py-1 bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 text-xs rounded-full">Crítico</span></td>
                    <td class="px-6 py-4 text-right">
                        <button class="text-slate-400 hover:text-primary-600"><span class="material-symbols-rounded">edit</span></button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
