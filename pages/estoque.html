<!-- ESTOQUE — Painel de flags manuais do Kanban -->
<div id="estoque" class="page hidden p-6 space-y-6">

    <!-- HEADER -->
    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 animate-fade-in">
        <div>
            <h2 class="text-2xl font-bold text-slate-900 dark:text-white flex items-center gap-2">
                <span class="material-symbols-rounded text-primary-500">inventory_2</span>
                Estoque — Regularização Kanban
            </h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-0.5">
                Posições marcadas manualmente como vazias pelos operadores
            </p>
        </div>
        <div class="flex items-center gap-3">
            <span id="badge-flags-pendentes"
                  class="px-3 py-1.5 rounded-full text-sm font-bold bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400">
                0
            </span>
            <span class="text-sm text-slate-400">pendentes</span>
        </div>
    </div>

    <!-- FILTROS -->
    <div class="flex items-center gap-2">
        <button class="flag-filtro active-filtro" data-status="todos"        onclick="filtrarFlags('todos')">Todos</button>
        <button class="flag-filtro"               data-status="pendente"     onclick="filtrarFlags('pendente')">
            <span class="w-2 h-2 rounded-full bg-red-500 inline-block mr-1.5"></span>Pendentes
        </button>
        <button class="flag-filtro"               data-status="regularizado" onclick="filtrarFlags('regularizado')">
            <span class="w-2 h-2 rounded-full bg-emerald-500 inline-block mr-1.5"></span>Regularizados
        </button>
        <button onclick="renderEstoque()" class="ml-auto flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-200 border border-slate-200 dark:border-slate-700 rounded-lg transition-colors">
            <span class="material-symbols-rounded text-sm">refresh</span>
            Atualizar
        </button>
    </div>

    <!-- CARDS -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="estoque-flags-lista">
        <div class="col-span-full text-center py-16 text-slate-400">
            <span class="material-symbols-rounded text-5xl mb-3 block opacity-30">inventory</span>
            <p class="font-medium">Carregando...</p>
        </div>
    </div>
</div>

<style>
.flag-pendente { border-color: rgba(239,68,68,.3) !important; background: rgba(239,68,68,.04); }
.flag-ok       { border-color: rgba(34,197,94,.25) !important; background: rgba(34,197,94,.03); }

.flag-filtro {
    padding: 5px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
    border: 1.5px solid rgba(148,163,184,.3);
    color: #94a3b8; cursor: pointer; transition: all .15s; background: transparent;
}
.flag-filtro:hover { border-color: #6366f1; color: #818cf8; }
.active-filtro    { background: #4f46e5 !important; border-color: #4f46e5 !important; color: #fff !important; }
</style>
